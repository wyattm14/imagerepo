name: Generate Social Image

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'JSON config for image generation'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu fonts-liberation

      - name: Generate image
        id: generate
        run: |
          python scripts/generate_v2.py --config '${{ github.event.inputs.config }}'

      - name: Get filename from config
        id: filename
        run: |
          FILENAME=$(echo '${{ github.event.inputs.config }}' | python -c "import sys, json; print(json.load(sys.stdin).get('filename', 'output.png'))")
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Commit and push generated image
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "Generated image: ${{ steps.filename.outputs.filename }}" || echo "No changes to commit"
          git push

      - name: Output image URL
        run: |
          echo "Image URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output/${{ steps.filename.outputs.filename }}"
          echo "image_url=https://raw.githubusercontent.com/${{ github.repository }}/main/output/${{ steps.filename.outputs.filename }}" >> $GITHUB_OUTPUT
