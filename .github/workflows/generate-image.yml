name: Generate Social Image

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Template name (announcement, feature-launch, tip, listicle, comparison)'
        required: true
        type: choice
        options:
          - announcement
          - feature-launch
          - tip
          - listicle
          - comparison
      headline:
        description: 'Main headline text'
        required: true
        type: string
      subheadline:
        description: 'Subheadline or supporting text'
        required: false
        type: string
        default: ''
      filename:
        description: 'Output filename (e.g., my-image.png)'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu fonts-liberation

      - name: Generate image
        id: generate
        run: |
          python scripts/generate.py \
            --template "${{ github.event.inputs.template }}" \
            --headline "${{ github.event.inputs.headline }}" \
            --subheadline "${{ github.event.inputs.subheadline }}" \
            --filename "${{ github.event.inputs.filename }}"

      - name: Commit and push generated image
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "Generated image: ${{ github.event.inputs.filename }}" || echo "No changes to commit"
          git push

      - name: Output image URL
        run: |
          echo "Image URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output/${{ github.event.inputs.filename }}"
          echo "image_url=https://raw.githubusercontent.com/${{ github.repository }}/main/output/${{ github.event.inputs.filename }}" >> $GITHUB_OUTPUT
